name: Tests

on:
  push:
    branches: [apex]
  pull_request:
    branches: [apex]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-queue:
        image: redis:7
        ports:
          - 11000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-cache:
        image: redis:7
        ports:
          - 13000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-socketio:
        image: redis:7
        ports:
          - 12000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bench CLI
        run: pip install frappe-bench

      - name: Create bench
        run: bench init --skip-redis-config-generation --frappe-branch version-15 frappe-bench

      - name: Configure bench Redis hosts
        working-directory: frappe-bench
        run: |
          bench set-config -g redis_cache "redis://127.0.0.1:13000"
          bench set-config -g redis_queue "redis://127.0.0.1:11000"
          bench set-config -g redis_socketio "redis://127.0.0.1:12000"

      - name: Get required Frappe apps
        working-directory: frappe-bench
        run: |
          bench get-app --branch version-15 --skip-assets erpnext
          bench get-app --branch version-15 --skip-assets hrms

      - name: Get apex_habitat app
        working-directory: frappe-bench
        run: bench get-app --skip-assets ${{ github.workspace }}

      - name: Create test site
        working-directory: frappe-bench
        run: |
          bench new-site test.localhost --db-root-password ${{ secrets.DB_ROOT_PASSWORD }} --admin-password ${{ secrets.ADMIN_PASSWORD }} --no-mariadb-socket
          bench --site test.localhost install-app erpnext
          bench --site test.localhost install-app hrms
          bench --site test.localhost install-app apex_habitat
          # The full suite creates far more than Frappe's default cap of 60 new
          # Users per 60s, which raises "Throttled" in many setUpClass blocks.
          # Write the cap as an INT directly into site_config (bench set-config
          # would store a string and break Frappe's `int > limit` comparison).
          python3 -c "import json, pathlib; p = pathlib.Path('sites/test.localhost/site_config.json'); c = json.loads(p.read_text()); c['throttle_user_limit'] = 100000; p.write_text(json.dumps(c, indent=1))"

      - name: Migrate (apply seeds, workflows and patches)
        working-directory: frappe-bench
        run: bench --site test.localhost migrate

      - name: Run the full test suite
        working-directory: frappe-bench
        run: bench --site test.localhost run-tests --app apex_habitat
