name: Migration Smoke Check

on:
  pull_request:
    paths:
      - "apex_habitat/patches/**"
      - "apex_habitat/patches.txt"

jobs:
  migrate-check:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-queue:
        image: redis:7
        ports:
          - 11000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-cache:
        image: redis:7
        ports:
          - 13000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-socketio:
        image: redis:7
        ports:
          - 12000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bench CLI
        run: pip install frappe-bench

      - name: Create bench
        run: bench init --skip-redis-config-generation --frappe-branch version-15 frappe-bench

      - name: Configure bench Redis hosts
        working-directory: frappe-bench
        run: |
          bench set-config -g redis_cache "redis://127.0.0.1:13000"
          bench set-config -g redis_queue "redis://127.0.0.1:11000"
          bench set-config -g redis_socketio "redis://127.0.0.1:12000"

      - name: Get required Frappe apps
        working-directory: frappe-bench
        run: |
          bench get-app --branch version-15 --skip-assets erpnext
          bench get-app --branch version-15 --skip-assets hrms

      - name: Get apex_habitat app
        working-directory: frappe-bench
        run: bench get-app --skip-assets ${{ github.workspace }}

      - name: Create site and migrate
        working-directory: frappe-bench
        run: |
          bench new-site test.localhost --db-root-password root --admin-password admin --no-mariadb-socket
          bench --site test.localhost install-app erpnext
          bench --site test.localhost install-app hrms
          bench --site test.localhost install-app apex_habitat
          bench --site test.localhost migrate
